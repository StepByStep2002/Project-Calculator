<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="javascript.js" defer></script>
</head>
<body>
    <h1>Project Calculator</h1>

    <div id="calcBody">

        <div id="calcDisplay">
            <div class="resultDivs" id="firstNumber"></div>
            <div class="resultDivs" id="operator"></div>
            <div class="resultDivs" id="secondNumber"></div>
            <div class="resultDivs" id="showResult"></div>
        </div>

        <div id="operators">
            <button id="add">+</button>
            <button id="substract">-</button>
            <button id="multiply">*</button>
            <button id="divide">/</button>
            <button id="floatPoint">.</button>
            <button id="result">=</button>
            <button id="backspace">C</button>
            <button id="clear">CE</button>
        </div>

        <div id="calcNumbers"></div>
    </div>
</body>
</html>
